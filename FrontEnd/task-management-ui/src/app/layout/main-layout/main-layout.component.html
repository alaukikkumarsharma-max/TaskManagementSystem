<nav class="navbar navbar-expand-lg app-navbar">
  <div class="container-fluid px-4">
    <a class="navbar-brand" routerLink="/dashboard">
      <i class="bi bi-kanban-fill me-2"></i>TaskFlow
    </a>

    <div class="navbar-nav-links">
      <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">
        <i class="bi bi-speedometer2 me-1"></i> Dashboard
      </a>
      <a class="nav-link" routerLink="/tasks" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <i class="bi bi-list-task me-1"></i> Tasks
      </a>
      @if (canManageTasks()) {
        <a class="nav-link" routerLink="/tasks/new" routerLinkActive="active">
          <i class="bi bi-plus-lg me-1"></i> Create Task
        </a>
      }
      @if (isAdmin()) {
        <a class="nav-link" routerLink="/audit-logs" routerLinkActive="active">
          <i class="bi bi-clock-history me-1"></i> Audit Logs
        </a>
      }
    </div>

    <div class="user-menu">
      <button class="user-menu-btn" type="button" (click)="toggleUserMenu()">
        <span class="avatar">{{ initials }}</span>
        <span class="user-info d-none d-md-flex">
          <span class="user-name">{{ currentUser()?.fullName }}</span>
          <span class="user-role">{{ currentUser()?.role }}</span>
        </span>
        <i class="bi bi-chevron-down small"></i>
      </button>

      @if (isUserMenuOpen()) {
        <div class="user-menu-dropdown">
          <div class="dropdown-email">{{ currentUser()?.email }}</div>
          <hr />
          <button class="dropdown-logout" type="button" (click)="logout()">
            <i class="bi bi-box-arrow-right me-2"></i>Log out
          </button>
        </div>
      }
    </div>
  </div>
</nav>

<main class="app-main">
  <router-outlet />
</main>
